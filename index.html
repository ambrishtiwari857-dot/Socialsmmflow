<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarSMMFlow</title>

<style>
body{font-family:Arial;background:#0b132b;color:white;margin:0}
.container{max-width:400px;margin:auto;padding:15px}
h1{font-size:22px}
.card{background:#1c2541;padding:15px;border-radius:12px;margin:10px 0}
button{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.buy{background:#00c853;color:white}
.trial{background:red;color:white}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
.notice{margin-top:10px;font-size:14px;color:#0f0}
</style>
</head>

<body>

<div id="auth" class="container">
<h1>SolarSMMFlow Login</h1>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
<p id="msg"></p>
</div>

<div id="panel" class="container" style="display:none;">
<h1>SolarSMMFlow</h1>
<p id="welcome"></p>
<p id="balance"></p>

<div class="card">
<h3>🎁 100 Free Followers</h3>
<input id="trialLink" placeholder="Instagram link">
<button class="trial" onclick="freeTrial()">Get Free</button>
</div>

<div class="card">
<h3>1K Followers - ₹80</h3>
<input id="link" placeholder="Enter link">
<input id="qty" placeholder="Quantity">
<button onclick="addBalance()">Add Balance</button>
<button class="buy" onclick="buy()">Buy</button>
<p id="order"></p>
</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")||"{}");
let current = JSON.parse(localStorage.getItem("current")||"null");

function save(){localStorage.setItem("users",JSON.stringify(users));}

function login(){
let u=user.value,p=pass.value;
if(!users[u]) return msg.innerText="User not found";
if(users[u].pass!=p) return msg.innerText="Wrong password";
current=u;
localStorage.setItem("current",JSON.stringify(u));
show();
}

function signup(){
let u=user.value,p=pass.value;
if(users[u]) return msg.innerText="Already exists";
users[u]={pass:p,balance:0,trial:false};
save();
msg.innerText="Signup success";
}

function show(){
auth.style.display="none";
panel.style.display="block";
welcome.innerText="Welcome "+current;
updateBalance();
}

function updateBalance(){
balance.innerText="Balance ₹"+users[current].balance;
}

function addBalance(){
let amt=100;
users[current].balance+=amt;
save();
updateBalance();
window.location.href="upi://pay?pa=ambrishtiwari@fam&pn=SolarSMMFlow&am="+amt;
}

function buy(){
let url=link.value,qtyv=qty.value;
if(!url||!qtyv) return order.innerText="Fill all fields";
if(users[current].balance<80) return order.innerText="Please add your balance then you buy service";

users[current].balance-=80;
save();
updateBalance();

let txt="Order\nUser:"+current+"\nFollowers 1K\nLink:"+url+"\nQty:"+qtyv;

order.innerHTML=`
<textarea style="width:100%;height:100px">${txt}</textarea>
<button onclick="copy()">Copy Order</button>
Send to: socialsmmflow@gmail.com
`;
}

function copy(){
navigator.clipboard.writeText(document.querySelector("textarea").value);
alert("Copied! Send via email");
}

function freeTrial(){
if(users[current].trial) return alert("You have already used this offer your free trial is end");

let url=trialLink.value;
if(!url) return alert("Enter Instagram link");

users[current].trial=true;
save();

let txt="Free Trial\nUser:"+current+"\n100 Followers\nLink:"+url;

order.innerHTML=`
<textarea style="width:100%;height:100px">${txt}</textarea>
<button onclick="copy()">Copy Order</button>
Send to: socialsmmflow@gmail.com
`;

alert("Free trial created");
}

if(current) show();

</script>

</body>
</html>
