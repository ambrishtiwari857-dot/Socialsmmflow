<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarSMMFlow</title>

<style>
body{background:#0b132b;color:white;font-family:Arial;margin:0}
.container{max-width:400px;margin:auto;padding:15px}
.card{background:#1c2541;padding:15px;border-radius:12px;margin:10px 0}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;width:100%;margin-top:5px}
.buy{background:#1d35ff;color:white}
.add{background:#f59e0b;color:white}
.trial{background:red;color:white}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none}
h2{margin:5px 0}
.note{color:#00ff88;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h2>🔥 SolarSMMFlow</h2>
<p id="bal">Balance ₹0</p>

<div class="card">
<h3>🎁 Free 100 Followers</h3>
<input id="trialLink" placeholder="Instagram link">
<button class="trial" onclick="trial()">Get Free</button>
<p id="trialMsg"></p>
</div>

<div class="card">
<h3 id="title">Select Service</h3>
<input id="url" placeholder="Enter link">
<input id="qty" placeholder="Quantity">

<button class="add" onclick="pay()">Add Balance</button>

<!-- ADMIN BUTTON (hide later) -->
<button onclick="verifyPayment()">✅ Payment Done</button>

<button class="buy" onclick="buy()">Buy Now</button>

<p id="msg"></p>
</div>

</div>

<script>

let balance = Number(localStorage.getItem("bal")||0)
let trialUsed = localStorage.getItem("trial")||"no"

function update(){
document.getElementById("bal").innerText="Balance ₹"+balance
}
update()

function pay(){
let amount = 100

let upi="upi://pay?pa=ambrishtiwari@fam&pn=SolarSMMFlow&am="+amount

document.getElementById("msg").innerText="UPI opened. Pay first then click 'Payment Done'"

window.location.href=upi
}

function verifyPayment(){
balance+=100
localStorage.setItem("bal",balance)
update()
alert("Payment verified")
}

function buy(){

let u=url.value
let q=qty.value

if(!u||!q) return msg.innerText="Fill all fields"

if(balance<80) return msg.innerText="Please add your balance then you buy service"

balance-=80
localStorage.setItem("bal",balance)
update()

msg.innerHTML="🎉 Congratulations your order is successful purchase"

}

function trial(){

if(trialUsed=="yes") return trialMsg.innerText="You have already used this offer your free trial is end"

let link=trialLink.value
if(!link) return trialMsg.innerText="Enter link"

localStorage.setItem("trial","yes")

trialMsg.innerHTML="🎉 Congratulations your order is successful purchase"

}

</script>

</body>
</html>
